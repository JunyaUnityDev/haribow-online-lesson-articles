---
layout: default
---

<article class="article-page">
  <div class="container container-narrow">
    {% assign category = site.data.categories[page.category] %}

    <header class="article-header">
      {% if category %}
        <a href="{{ '/category/' | append: category.slug | append: '/' | relative_url }}" class="article-category-link" style="color: {{ category.color }};">
          {{ category.name }}
        </a>
      {% endif %}

      <h1 class="article-title">{{ page.title }}</h1>

      {% if page.description %}
        <p class="article-description">{{ page.description }}</p>
      {% endif %}

      <time class="article-date" datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%Y.%m.%d" }}
      </time>
    </header>

    <div class="article-body">
      {{ content }}
    </div>

    <footer class="article-footer">
      <a href="{{ '/articles/' | relative_url }}" class="back-link">← 記事一覧へ</a>
    </footer>
  </div>
</article>
