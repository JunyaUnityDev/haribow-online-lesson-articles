title: HARIBOW Online Lesson
tagline: 脳の設計から考える、ダブルダッチ継続の科学
description: HARIBOW のオンラインレッスン受講者向けに、思想・技術記事を発信します。
url: https://junyaunitydev.github.io
baseurl: /haribow-online-lesson-articles

markdown: kramdown
highlighter: rouge
permalink: /articles/:slug/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

sass:
  style: compressed

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "article"

collections:
  posts:
    output: true

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md

author:
  name: JUNYA
  email: ""
