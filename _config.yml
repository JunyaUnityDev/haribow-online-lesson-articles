title: HARIBOW Online Lesson
tagline: ダブルダッチが、もっとうまく、もっと楽しくなる
description: HARIBOW のオンラインレッスン受講者向けに、思想・技術記事を発信します。
url: https://junyaunitydev.github.io
baseurl: /haribow-online-lesson-articles

markdown: kramdown
highlighter: rouge
permalink: /articles/:slug/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

sass:
  style: compressed

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "article"
  - scope:
      path: ""
      type: "scheduled"
    values:
      layout: "article"
      sitemap: false

collections:
  posts:
    output: true
  scheduled:
    output: true
    permalink: /scheduled/:slug/

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md

author:
  name: JUNYA
  email: ""
